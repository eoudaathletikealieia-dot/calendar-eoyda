<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ε.Ο.Υ.Δ.Α. — Πρόγραμμα Αθλητικής Αλιείας</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean: #0f2744;
    --deep: #163356;
    --mid: #1c3f6b;
    --surface: #244d82;
    --accent: #22d3ee;
    --accent2: #bae6fd;
    --gold: #fbbf24;
    --green: #34d399;
    --pink: #f87171;
    --yellow: #fde68a;
    --text: #e0f2fe;
    --muted: #93c5fd;
    --border: rgba(34,211,238,0.2);
    --admin-bg: #0f2744;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--ocean); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height:100vh;
    background-image: radial-gradient(ellipse at 20% 0%, rgba(34,211,238,0.14) 0%, transparent 55%),
                      radial-gradient(ellipse at 80% 100%, rgba(22,51,86,0.7) 0%, transparent 60%); }

  /* HEADER */
  header { background: linear-gradient(135deg,#163356,#0f2744); border-bottom:1px solid var(--border); padding:20px 32px 16px;
    display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .logo-area { display:flex; align-items:center; gap:14px; }
  .logo-img { width:72px; height:72px; border-radius:50%; object-fit:cover; border:2px solid rgba(34,211,238,0.5); flex-shrink:0; background:white; }
  .title-block h1 { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:3px; color:var(--accent); line-height:1; }
  .title-block p { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:3px; }
  .stats-bar { display:flex; gap:20px; }
  .stat { text-align:center; }
  .stat-num { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--accent); line-height:1; }
  .stat-label { font-size:9px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; }
  .admin-btn { padding:7px 14px; border-radius:6px; border:1px solid rgba(244,162,97,0.4); background:rgba(244,162,97,0.1);
    color:#f4a261; font-size:11px; cursor:pointer; letter-spacing:1px; font-family:'IBM Plex Sans',sans-serif;
    transition:all 0.2s; }
  .admin-btn:hover { background:rgba(244,162,97,0.2); border-color:#f4a261; }

  /* CONTROLS */
  .controls { padding:16px 32px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    border-bottom:1px solid var(--border); background:rgba(22,51,86,0.6); }
  .search-box { flex:1; min-width:180px; background:var(--mid); border:1px solid var(--border); border-radius:6px;
    padding:8px 14px; color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s; }
  .search-box:focus { border-color:var(--accent); }
  .search-box::placeholder { color:var(--muted); }
  .filter-btn { padding:7px 13px; border-radius:6px; border:1px solid var(--border); background:var(--mid);
    color:var(--muted); font-family:'IBM Plex Sans',sans-serif; font-size:12px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .filter-btn:hover { border-color:var(--accent); color:var(--accent); }
  .filter-btn.active { background:var(--accent); color:var(--ocean); border-color:var(--accent); font-weight:600; }
  .view-toggle { display:flex; gap:3px; background:var(--mid); border:1px solid var(--border); border-radius:6px; padding:3px; }
  .view-btn { padding:5px 11px; border-radius:4px; border:none; background:transparent; color:var(--muted);
    font-size:12px; cursor:pointer; transition:all 0.2s; font-family:'IBM Plex Sans',sans-serif; }
  .view-btn.active { background:var(--accent); color:var(--ocean); font-weight:600; }

  /* MAIN */
  main { padding:20px 32px; }
  .table-wrap { overflow-x:auto; overflow-y:auto; max-height:calc(100vh - 200px); border-radius:10px; border:1px solid var(--border); }
  .table-wrap thead { background:var(--surface); position:sticky; top:0; z-index:10; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead { background:var(--surface); }
  thead th { padding:11px 16px; text-align:left; font-family:'IBM Plex Mono',monospace; font-size:10px;
    letter-spacing:2px; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); white-space:nowrap; }
  tbody tr { border-bottom:1px solid rgba(0,180,216,0.07); transition:background 0.15s; animation:fadeRow 0.3s ease both; }
  tbody tr:hover { background:rgba(0,180,216,0.06); }
  tbody td { padding:10px 16px; vertical-align:middle; line-height:1.4; }
  @keyframes fadeRow { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .sport-badge { display:inline-block; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:600; letter-spacing:0.5px; white-space:nowrap; }
  .date-cell { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--accent2); white-space:nowrap; }
  .date-alt { font-size:10px; color:var(--muted); display:block; margin-top:2px; }
  .location-cell { color:var(--gold); font-size:12px; font-weight:500; }
  .org-cell { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); }
  .sport-fellos    { background:rgba(34,211,238,0.2); color:#67e8f9; border:1px solid rgba(34,211,238,0.45); }
  .sport-kakami    { background:rgba(251,191,36,0.2); color:#fcd34d; border:1px solid rgba(251,191,36,0.45); }
  .sport-katheti   { background:rgba(52,211,153,0.2); color:#6ee7b7; border:1px solid rgba(52,211,153,0.45); }
  .sport-eging     { background:rgba(248,113,113,0.2); color:#fca5a5; border:1px solid rgba(248,113,113,0.45); }
  .sport-volesb    { background:rgba(253,230,138,0.2); color:#fde68a; border:1px solid rgba(253,230,138,0.45); }
  .sport-voles     { background:rgba(253,230,138,0.2); color:#fde68a; border:1px solid rgba(253,230,138,0.45); }
  .sport-esoterika { background:rgba(192,132,252,0.2); color:#d8b4fe; border:1px solid rgba(192,132,252,0.45); }
  .sport-kyprina   { background:rgba(251,146,60,0.2); color:#fdba74; border:1px solid rgba(251,146,60,0.45); }
  tr.panellinio td { background:rgba(255,209,102,0.03); }
  tr.past td { opacity:0.45; }
  tr.next-event td { background:rgba(45,198,83,0.07); }
  tr.next-event td:first-child { border-left:2px solid var(--green); }
  tr.upcoming td:first-child { border-left:2px solid transparent; }

  /* ACTION BUTTONS in table */
  .row-actions { display:flex; gap:6px; }
  .row-btn { padding:3px 8px; border-radius:4px; font-size:10px; cursor:pointer; border:1px solid; font-family:'IBM Plex Sans',sans-serif; transition:all 0.15s; }
  .row-edit { border-color:rgba(0,180,216,0.4); background:rgba(0,180,216,0.1); color:#90e0ef; }
  .row-edit:hover { background:rgba(0,180,216,0.25); }
  .row-del  { border-color:rgba(230,57,70,0.4); background:rgba(230,57,70,0.1); color:#e63946; }
  .row-del:hover  { background:rgba(230,57,70,0.25); }

  /* CARDS */
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:14px; }
  .event-card { background:var(--deep); border:1px solid var(--border); border-radius:10px; padding:15px;
    transition:all 0.2s; animation:fadeRow 0.3s ease both; position:relative; overflow:hidden; }
  .event-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .event-card.sport-fellos::before    { background:#00b4d8; }
  .event-card.sport-kakami::before    { background:#f4a261; }
  .event-card.sport-katheti::before   { background:#2dc653; }
  .event-card.sport-eging::before     { background:#e63946; }
  .event-card.sport-volesb::before    { background:#ffd166; }
  .event-card.sport-voles::before     { background:#ffd166; }
  .event-card.sport-esoterika::before { background:#c084fc; }
  .event-card.sport-kyprina::before   { background:#fb923c; }
  .event-card:hover { border-color:rgba(0,180,216,0.35); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
  .event-card.past { opacity:0.5; }
  .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .card-date { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--accent); }
  .card-title { font-size:13px; font-weight:600; color:var(--text); margin:5px 0 4px; line-height:1.4; }
  .card-location { font-size:12px; color:var(--gold); }
  .card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px;
    padding-top:8px; border-top:1px solid var(--border); }
  .card-org { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); }

  /* NEXT BANNER */
  .next-banner { background:linear-gradient(135deg,rgba(45,198,83,0.1),rgba(0,180,216,0.1));
    border:1px solid rgba(45,198,83,0.3); border-radius:10px; padding:12px 18px; margin-bottom:18px;
    display:flex; align-items:center; gap:14px; animation:pulse-border 2s ease-in-out infinite; }
  @keyframes pulse-border { 0%,100%{border-color:rgba(45,198,83,0.3)} 50%{border-color:rgba(45,198,83,0.7)} }
  .next-dot { width:10px; height:10px; border-radius:50%; background:var(--green);
    box-shadow:0 0 0 3px rgba(45,198,83,0.25); flex-shrink:0; animation:blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .next-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--green); font-weight:600; }
  .next-info { font-size:13px; color:var(--text); font-weight:500; }
  .next-date { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent2); margin-top:2px; }

  /* EMPTY */
  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-state h3 { font-size:18px; margin-bottom:8px; }

  /* RESULTS */
  .results-info { font-size:11px; color:var(--muted); padding:8px 32px 0; font-family:'IBM Plex Mono',monospace; }

  /* LEGEND */
  .legend { display:flex; flex-wrap:wrap; gap:10px; padding:14px 32px; border-top:1px solid var(--border); background:rgba(22,51,86,0.5); }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); }
  .legend-dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--ocean); }
  ::-webkit-scrollbar-thumb { background:var(--surface); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--muted); }

  /* ============= ADMIN OVERLAY ============= */
  .admin-overlay { position:fixed; inset:0; z-index:999; display:none; }
  .admin-overlay.open { display:flex; align-items:center; justify-content:center; }
  .admin-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(6px); }

  /* LOGIN */
  .login-box { position:relative; z-index:1; background:var(--deep); border:1px solid rgba(244,162,97,0.3);
    border-radius:14px; padding:36px; width:340px; text-align:center; }
  .login-box h2 { font-family:'Bebas Neue',sans-serif; font-size:22px; color:#f4a261; letter-spacing:3px; margin-bottom:6px; }
  .login-box p { font-size:12px; color:var(--muted); margin-bottom:24px; }
  .login-input { width:100%; background:var(--mid); border:1px solid var(--border); border-radius:7px;
    padding:10px 14px; color:var(--text); font-size:14px; font-family:'IBM Plex Mono',monospace;
    letter-spacing:4px; text-align:center; outline:none; margin-bottom:14px; }
  .login-input:focus { border-color:#f4a261; }
  .login-submit { width:100%; padding:10px; background:rgba(244,162,97,0.15); border:1px solid rgba(244,162,97,0.5);
    border-radius:7px; color:#f4a261; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px;
    cursor:pointer; transition:all 0.2s; }
  .login-submit:hover { background:rgba(244,162,97,0.25); }
  .login-error { color:var(--pink); font-size:12px; margin-top:8px; min-height:16px; }
  .login-close { position:absolute; top:12px; right:14px; background:none; border:none; color:var(--muted);
    cursor:pointer; font-size:20px; }

  /* ADMIN PANEL */
  .admin-panel { position:relative; z-index:1; background:var(--deep); border:1px solid rgba(244,162,97,0.3);
    border-radius:14px; width:min(900px,96vw); max-height:90vh; display:flex; flex-direction:column; overflow:hidden; }
  .admin-header { display:flex; align-items:center; justify-content:space-between; padding:18px 24px;
    border-bottom:1px solid rgba(244,162,97,0.2); background:rgba(244,162,97,0.05); }
  .admin-header h2 { font-family:'Bebas Neue',sans-serif; font-size:20px; color:#f4a261; letter-spacing:3px; }
  .admin-actions { display:flex; gap:10px; align-items:center; }
  .btn-add { padding:8px 16px; background:rgba(45,198,83,0.15); border:1px solid rgba(45,198,83,0.4);
    border-radius:7px; color:#2dc653; font-family:'IBM Plex Sans',sans-serif; font-size:12px; font-weight:600;
    cursor:pointer; transition:all 0.2s; }
  .btn-add:hover { background:rgba(45,198,83,0.25); }
  .btn-logout { padding:8px 14px; background:transparent; border:1px solid var(--border); border-radius:7px;
    color:var(--muted); font-size:11px; cursor:pointer; transition:all 0.2s; font-family:'IBM Plex Sans',sans-serif; }
  .btn-logout:hover { border-color:var(--pink); color:var(--pink); }
  .admin-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:22px; margin-left:4px; }
  .admin-body { overflow-y:auto; padding:16px 24px; flex:1; }

  /* ADMIN TABLE */
  .admin-table { width:100%; border-collapse:collapse; font-size:12px; }
  .admin-table th { padding:9px 10px; text-align:left; font-family:'IBM Plex Mono',monospace; font-size:9px;
    letter-spacing:2px; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); }
  .admin-table td { padding:8px 10px; border-bottom:1px solid rgba(0,180,216,0.06); vertical-align:top; }
  .admin-table tr:hover td { background:rgba(0,180,216,0.05); }

  /* EDIT FORM */
  .edit-form-overlay { position:fixed; inset:0; z-index:1100; display:none; align-items:center; justify-content:center; }
  .edit-form-overlay.open { display:flex; }
  .edit-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.6); }
  .edit-box { position:relative; z-index:1; background:#163356; border:1px solid rgba(0,180,216,0.3);
    border-radius:12px; padding:28px; width:min(560px,94vw); max-height:90vh; overflow-y:auto; }
  .edit-box h3 { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--accent); letter-spacing:2px; margin-bottom:18px; }
  .form-row { margin-bottom:14px; }
  .form-row label { display:block; font-size:10px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-bottom:5px; }
  .form-row input, .form-row select { width:100%; background:var(--mid); border:1px solid var(--border);
    border-radius:6px; padding:8px 12px; color:var(--text); font-size:13px; font-family:'IBM Plex Sans',sans-serif; outline:none; }
  .form-row input:focus, .form-row select:focus { border-color:var(--accent); }
  .form-row select option { background:#163356; }
  .form-row input[type=checkbox] { width:auto; margin-right:8px; }
  .form-btns { display:flex; gap:10px; margin-top:20px; }
  .btn-save { flex:1; padding:10px; background:rgba(0,180,216,0.2); border:1px solid var(--accent);
    border-radius:7px; color:var(--accent); font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:2px; cursor:pointer; }
  .btn-save:hover { background:rgba(0,180,216,0.35); }
  .btn-cancel { padding:10px 18px; background:transparent; border:1px solid var(--border); border-radius:7px;
    color:var(--muted); cursor:pointer; font-size:12px; font-family:'IBM Plex Sans',sans-serif; }
  .btn-cancel:hover { border-color:var(--pink); color:var(--pink); }
  .edit-close { position:absolute; top:12px; right:14px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; }

  /* RESPONSIVE */
  @media (max-width:768px) {
    header { flex-direction:column; gap:10px; padding:14px 16px; }
    .controls { padding:10px 16px; }
    main { padding:14px 16px; }
    .legend { padding:10px 16px; }
    .results-info { padding:6px 16px 0; }
    thead th:nth-child(5), tbody td:nth-child(5) { display:none; }
  }
</style>
</head>

  { sport:"ΚΥΠΡΙΝΟΣ",                date:"",           dateAlt:"",           type:"12ο Πανελλήνιο Πρωτάθλημα",                                 location:"",                       org:"",     panellinio:true },
  { sport:"ΒΟΛΕΣ",                   date:"13/5/2026",  dateAlt:"17/5/2026",  type:"Greece Open",                                                location:"",                       org:"ΦΑΡ" }

// LOAD/SAVE
function loadEvents() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_EVENTS));
}
function saveEvents(arr) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}
let EVENTS = loadEvents();

// Parse date
function parseDate(str) {
  if (!str) return null;
  const clean = str.trim();
  const mRange = clean.match(/^(\d+)[-–]\d+[/\-](\d+)[/\-](\d{4})$/);
  if (mRange) return new Date(+mRange[3], +mRange[2]-1, +mRange[1]);
  const simple = clean.match(/^(\d+)[/\-](\d+)[/\-](\d{4})$/);
  if (simple) return new Date(+simple[3], +simple[2]-1, +simple[1]);
  return null;
}

// Sport CSS class
function sportClass(s) {
  if (s.includes("ΦΕΛΟΣ"))      return "sport-fellos";
  if (s.includes("ΚΑΣΤΙΝΓΚ"))   return "sport-kakami";
  if (s.includes("ΚΑΘΕΤΗ"))     return "sport-katheti";
  if (s.includes("EGING"))      return "sport-eging";
  if (s.includes("ΘΑΛΑΣΣΙΕΣ")) return "sport-volesb";
  if (s.includes("ΒΟΛΕΣ"))      return "sport-voles";
  if (s.includes("ΕΣΩΤΕΡΙΚΑ")) return "sport-esoterika";
  if (s.includes("ΚΥΠΡΙΝΟΣ"))  return "sport-kyprina";
  return "";
}

let currentView = "table", currentTime = "all", activeSport = "all", searchQuery = "";

// Sports filters
function buildSportFilters() {
  const allSports = [...new Set(EVENTS.map(e => e.sport))];
  const c = document.getElementById("sportFilters");
  c.innerHTML = `<button class="filter-btn active" onclick="setSportFilter('all')" id="sf-all">Όλα</button>`;
  allSports.forEach(s => {
    const short = s.replace("ΚΑΣΤΙΝΓΚ","ΚΑΛΑΜΙ").replace("ΘΑΛΑΣΣΙΕΣ ΒΟΛΕΣ","ΘΑΛ. ΒΟΛΕΣ").replace("ΕΣΩΤΕΡΙΚΑ ΝΕΡΑ","ΕΣΩΤ. ΝΕΡΑ");
    c.innerHTML += `<button class="filter-btn sport-filter" id="sf-${encodeURIComponent(s)}" onclick="setSportFilter('${s}')">${short}</button>`;
  });
}
function setSportFilter(s) {
  activeSport = s;
  document.querySelectorAll(".sport-filter,#sf-all").forEach(b => b.classList.remove("active"));
  const id = s === "all" ? "sf-all" : `sf-${encodeURIComponent(s)}`;
  document.getElementById(id)?.classList.add("active");
  render();
}
function setTimeFilter(t) {
  currentTime = t;
  ["btnAll","btnUpcoming","btnPast"].forEach(id => document.getElementById(id).classList.remove("active"));
  document.getElementById(t==="all"?"btnAll":t==="upcoming"?"btnUpcoming":"btnPast").classList.add("active");
  render();
}
function setView(v) {
  currentView = v;
  document.getElementById("viewTable").classList.toggle("active", v==="table");
  document.getElementById("viewCards").classList.toggle("active", v==="cards");
  render();
}
document.getElementById("searchInput").addEventListener("input", e => { searchQuery = e.target.value.toLowerCase(); render(); });

function filteredEvents() {
  return EVENTS.filter(e => {
    const d = parseDate(e.date);
    if (activeSport !== "all" && e.sport !== activeSport) return false;
    if (currentTime === "upcoming" && d && d < TODAY) return false;
    if (currentTime === "past"     && d && d >= TODAY) return false;
    if (searchQuery) {
      const hay = (e.sport+e.type+e.location+e.org+e.date).toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    return true;
  });
}
function nextEvent() {
  return EVENTS.filter(e => { const d = parseDate(e.date); return d && d >= TODAY; }).sort((a,b)=>parseDate(a.date)-parseDate(b.date))[0];
}
function isPast(e) { const d=parseDate(e.date); return d && d < TODAY; }
function isNext(e) { const ne=nextEvent(); return ne && e===ne; }

function buildStats() {
  const total    = EVENTS.length;
  const upcoming = EVENTS.filter(e => { const d=parseDate(e.date); return !d || d>=TODAY; }).length;
  const pans     = EVENTS.filter(e => e.panellinio).length;
  const sports   = new Set(EVENTS.map(e=>e.sport)).size;
  document.getElementById("statsBar").innerHTML = `
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Αγώνες</div></div>
    <div class="stat"><div class="stat-num">${upcoming}</div><div class="stat-label">Επερχόμενοι</div></div>
    <div class="stat"><div class="stat-num">${pans}</div><div class="stat-label">Πανελλήνια</div></div>
    <div class="stat"><div class="stat-num">${sports}</div><div class="stat-label">Αθλήματα</div></div>`;
}

function nextBannerHtml() {
  const ne = nextEvent();
  if (!ne) return "";
  return `<div class="next-banner"><div class="next-dot"></div><div>
    <div class="next-label">▶ Επόμενος αγώνας</div>
    <div class="next-info">${ne.sport} — ${ne.type}</div>
    <div class="next-date">${ne.date||""}${ne.location?" · "+ne.location:""}${ne.org?" · "+ne.org:""}</div>
  </div></div>`;
}

function adminBtns(idx) {
  return `<div class="row-actions">
    <button class="row-btn row-edit" onclick="openEditForm(${idx})">✏ Επεξ.</button>
    <button class="row-btn row-del"  onclick="deleteEvent(${idx})">🗑 Διαγρ.</button>
  </div>`;
}

function renderTable(events) {
  if (!events.length) return emptyState();
  const rows = events.map((e,i) => {
    const globalIdx = EVENTS.indexOf(e);
    const past = isPast(e) ? "past" : "";
    const nxt  = isNext(e) ? "next-event" : "";
    const pan  = e.panellinio ? "panellinio" : "";
    const actBtns = adminLoggedIn ? `<td>${adminBtns(globalIdx)}</td>` : "";
    return `<tr class="${past} ${nxt} ${pan}" style="animation-delay:${i*0.02}s">
      <td><span class="sport-badge ${sportClass(e.sport)}">${e.sport}</span></td>
      <td class="date-cell">${e.date||"—"}${e.dateAlt?`<span class="date-alt">Εναλλ: ${e.dateAlt}</span>`:""}</td>
      <td style="font-size:12px;">${e.type}${e.panellinio?" <span style='color:var(--yellow);font-size:10px;'>★</span>":""}</td>
      <td class="location-cell">${e.location||"—"}</td>
      <td class="org-cell">${e.org||"—"}</td>
      ${actBtns}
    </tr>`;
  }).join("");
  const actHeader = adminLoggedIn ? "<th>Ενέργειες</th>" : "";
  return `${nextBannerHtml()}<div class="table-wrap"><table>
    <thead><tr><th>Άθλημα</th><th>Ημερομηνία</th><th>Τύπος Αγώνα</th><th>Τοποθεσία</th><th>Σύλλογος</th>${actHeader}</tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}
function renderCards(events) {
  if (!events.length) return emptyState();
  const cards = events.map((e,i) => {
    const globalIdx = EVENTS.indexOf(e);
    const cls = sportClass(e.sport);
    const past = isPast(e)?"past":"";
    const actBtns = adminLoggedIn ? `<div style="margin-top:8px;display:flex;gap:6px;">${adminBtns(globalIdx).replace('<div class="row-actions">','').replace('</div>','')}</div>` : "";
    return `<div class="event-card ${cls} ${past}" style="animation-delay:${i*0.03}s">
      <div class="card-header"><span class="sport-badge ${cls}">${e.sport}</span>${e.panellinio?"<span style='color:var(--yellow);font-size:10px;'>★ Πανελλήνιο</span>":""}</div>
      <div class="card-date">${e.date||"—"}${e.dateAlt?" → "+e.dateAlt:""}</div>
      <div class="card-title">${e.type}</div>
      ${e.location?`<div class="card-location">📍 ${e.location}</div>`:""}
      <div class="card-footer">
        <span class="card-org">${e.org||"—"}</span>
        ${isPast(e)?'<span style="font-size:10px;color:var(--muted)">Ολοκληρώθηκε</span>':(isNext(e)?'<span style="font-size:10px;color:var(--green)">▶ Επόμενος</span>':'')}
      </div>
      ${actBtns}
    </div>`;
  }).join("");
  return `${nextBannerHtml()}<div class="cards-grid">${cards}</div>`;
}
function emptyState() { return '<div class="empty-state"><h3>Δεν βρέθηκαν αγώνες</h3><p>Δοκίμασε διαφορετικά φίλτρα.</p></div>'; }

function render() {
  const events = filteredEvents();
  document.getElementById("resultsInfo").textContent = `${events.length} αγώνες εμφανίζονται`;
  document.getElementById("mainContent").innerHTML = currentView==="table" ? renderTable(events) : renderCards(events);
}

// ===== ADMIN =====
function openAdmin() {
  document.getElementById("adminOverlay").classList.add("open");
  if (adminLoggedIn) { showAdminPanel(); }
  else { document.getElementById("loginBox").style.display=""; document.getElementById("adminPanel").style.display="none"; document.getElementById("loginError").textContent=""; document.getElementById("pwInput").value=""; }
}
function closeAdmin() { document.getElementById("adminOverlay").classList.remove("open"); }
function doLogin() {
  const pw = document.getElementById("pwInput").value;
  if (pw === ADMIN_PASS) {
    adminLoggedIn = true;
    showAdminPanel();
    render();
  } else {
    document.getElementById("loginError").textContent = "Λάθος κωδικός. Δοκίμασε ξανά.";
    document.getElementById("pwInput").value = "";
    document.getElementById("pwInput").focus();
  }
}
function doLogout() { adminLoggedIn = false; closeAdmin(); render(); }
function showAdminPanel() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("adminPanel").style.display = "";
  renderAdminTable();
}
function renderAdminTable() {
  const tbody = document.getElementById("adminTbody");
  tbody.innerHTML = EVENTS.map((e,i) => `<tr>
    <td><span class="sport-badge ${sportClass(e.sport)}" style="font-size:10px;">${e.sport}</span></td>
    <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent2);">${e.date||"—"}</td>
    <td style="font-size:11px;max-width:200px;">${e.type}</td>
    <td style="font-size:11px;color:var(--gold);">${e.location||"—"}</td>
    <td style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);">${e.org||"—"}</td>
    <td>${adminBtns(i)}</td>
  </tr>`).join("");
}

// ===== EDIT FORM =====
function openEditForm(idx) {
  const isNew = idx === null;
  document.getElementById("editTitle").textContent = isNew ? "ΝΕΟΣ ΑΓΩΝΑΣ" : "ΕΠΕΞΕΡΓΑΣΙΑ ΑΓΩΝΑ";
  document.getElementById("editIdx").value = isNew ? "" : idx;
  const e = isNew ? {} : EVENTS[idx];
  document.getElementById("fSport").value    = e.sport    || "ΦΕΛΟΣ ΘΑΛΑΣΣΑ";
  document.getElementById("fDate").value     = e.date     || "";
  document.getElementById("fDateAlt").value  = e.dateAlt  || "";
  document.getElementById("fType").value     = e.type     || "";
  document.getElementById("fLocation").value = e.location || "";
  document.getElementById("fOrg").value      = e.org      || "";
  document.getElementById("fPan").checked    = !!e.panellinio;
  document.getElementById("editOverlay").classList.add("open");
}
function closeEditForm() { document.getElementById("editOverlay").classList.remove("open"); }
function saveEvent() {
  const idxStr = document.getElementById("editIdx").value;
  const ev = {
    sport:      document.getElementById("fSport").value.trim(),
    date:       document.getElementById("fDate").value.trim(),
    dateAlt:    document.getElementById("fDateAlt").value.trim(),
    type:       document.getElementById("fType").value.trim(),
    location:   document.getElementById("fLocation").value.trim(),
    org:        document.getElementById("fOrg").value.trim(),
    panellinio: document.getElementById("fPan").checked || undefined
  };
  if (!ev.panellinio) delete ev.panellinio;
  if (idxStr === "") { EVENTS.push(ev); }
  else { EVENTS[parseInt(idxStr)] = ev; }
  saveEvents(EVENTS);
  closeEditForm();
  buildSportFilters();
  buildStats();
  render();
  renderAdminTable();
}
function deleteEvent(idx) {
  if (!confirm("Διαγραφή αγώνα;")) return;
  EVENTS.splice(idx, 1);
  saveEvents(EVENTS);
  buildSportFilters();
  buildStats();
  render();
  renderAdminTable();
}

// INIT
buildSportFilters();
buildStats();
render();
</script>
</body>
</html>
